# .github/workflows/build-windows-exe.yml

name: Build Windows Executable

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug
      platform:
        description: 'Target platform'
        required: true
        default: 'x64'
        type: choice
        options:
          - x64
          - x86
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'VoiceControlApp/**'
      - 'build.ps1'
      - '.github/workflows/build-windows-exe.yml'

jobs:
  build-on-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      # Step 1: Check out repository code
      - name: Check out repository code
        uses: actions/checkout@v4

      # Step 2: Set up .NET 8 SDK
      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          dotnet-quality: 'ga'

      # Step 3: Set up MSBuild (for WinUI3)
      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      # Step 4: Set up NuGet
      - name: Set up NuGet
        uses: NuGet/setup-nuget@v2.0.0

      # Step 5: Install Windows SDK and Visual Studio components
      - name: Install Windows SDK
        shell: powershell
        run: |
          Write-Host "🔧 Installing Windows SDK components..."
          
          # Install Visual Studio Build Tools components needed for WinUI3
          $vsInstallPath = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe"
          if (Test-Path $vsInstallPath) {
            Write-Host "Installing Windows SDK components..."
            & $vsInstallPath modify --installPath "${env:ProgramFiles}\Microsoft Visual Studio\2022\Enterprise" --add Microsoft.VisualStudio.Component.Windows10SDK.19041 --quiet
          }
          
          Write-Host "✅ Windows SDK setup completed"

      # Step 6: Cache NuGet packages
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('VoiceControlApp/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # Step 7: Install Python for Whisper (needed by the app)
      - name: Install Python and Whisper
        shell: powershell
        run: |
          Write-Host "🐍 Installing Python and Whisper dependencies..."
          
          # Install Python
          $pythonVersion = "3.11.9"
          $pythonUrl = "https://www.python.org/ftp/python/$pythonVersion/python-$pythonVersion-amd64.exe"
          $pythonInstaller = "python-installer.exe"
          
          Invoke-WebRequest -Uri $pythonUrl -OutFile $pythonInstaller
          & ./$pythonInstaller /quiet InstallAllUsers=1 PrependPath=1
          
          # Refresh PATH
          $env:PATH = [System.Environment]::GetEnvironmentVariable("PATH","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("PATH","User")
          
          # Verify Python installation
          python --version
          pip --version
          
          # Install OpenAI Whisper
          Write-Host "Installing OpenAI Whisper..."
          pip install openai-whisper==20231117
          
          # Test Whisper installation
          python -c "import whisper; print('✅ Whisper installed successfully')"
          
          Write-Host "✅ Python and Whisper setup completed"

      # Step 8: Build WinUI3 Application
      - name: Build WinUI3 Voice Control App
        shell: powershell
        run: |
          Write-Host "🔨 Building WinUI3 Voice Control Application..."
          
          # Set build parameters
          $Configuration = if ("${{ github.event.inputs.build_type }}" -eq "debug") { "Debug" } else { "Release" }
          $Platform = if ("${{ github.event.inputs.platform }}") { "${{ github.event.inputs.platform }}" } else { "x64" }
          
          Write-Host "Configuration: $Configuration"
          Write-Host "Platform: $Platform"
          
          # Run the build script
          try {
            .\build.ps1 -Configuration $Configuration -Platform $Platform -Clean -Verbose
            
            if ($LASTEXITCODE -ne 0) {
              Write-Error "❌ Build script failed with exit code $LASTEXITCODE"
              exit 1
            }
            
            Write-Host "✅ Build completed successfully"
          } catch {
            Write-Error "❌ Build process failed: $_"
            Write-Host "Error details: $($_.Exception.Message)"
            Write-Host "Stack trace: $($_.ScriptStackTrace)"
            exit 1
          }

      # Step 9: Verify build output  
      - name: Verify build output
        shell: powershell
        run: |
          Write-Host "🔍 Verifying build output..."
          
          if (-not (Test-Path "dist")) {
            Write-Error "❌ dist directory not found!"
            exit 1
          }
          
          $exeFile = Get-ChildItem -Path "dist" -Filter "*.exe" | Select-Object -First 1
          
          if (-not $exeFile) {
            Write-Error "❌ Executable not found in dist directory!"
            Get-ChildItem -Recurse "dist" -ErrorAction SilentlyContinue
            exit 1
          }
          
          $sizeMB = [math]::Round($exeFile.Length / 1MB, 1)
          
          Write-Host "📊 Build Results:"
          Write-Host "  📄 Executable: $($exeFile.Name) - $sizeMB MB"
          Write-Host "  📅 Created: $($exeFile.CreationTime)"
          Write-Host "  📁 Location: $(Resolve-Path $exeFile.FullName)"
          
          # List all files in dist
          Write-Host "`n📁 All files in dist:"
          Get-ChildItem -Recurse "dist" | ForEach-Object {
            $size = if ($_.PSIsContainer) { "[DIR]" } else { "$([math]::Round($_.Length / 1KB, 1)) KB" }
            Write-Host "  $($_.Name): $size"
          }
          
          # Basic executable validation
          Write-Host "`n🧪 Basic executable validation..."
          if ($exeFile.Length -lt 1MB) {
            Write-Host "⚠️ Warning: Executable is very small ($sizeMB MB) - may be missing dependencies"
          } elseif ($exeFile.Length -gt 500MB) {
            Write-Host "⚠️ Warning: Executable is very large ($sizeMB MB) - consider optimization"
          } else {
            Write-Host "✅ Executable size looks reasonable ($sizeMB MB)"
          }

      # Step 10: Create distribution package
      - name: Create distribution package
        shell: powershell
        run: |
          Write-Host "📦 Creating distribution package..."
          
          # Create package directory
          $packageName = "VoiceCommandTool-Windows-x64"
          New-Item -ItemType Directory -Path $packageName -Force
          
          # Copy main executable
          Copy-Item "dist\VoiceCommandTool.exe" "$packageName\"
          
          # Copy additional files
          @("README.md", "LICENSE", "config.json") | ForEach-Object {
            if (Test-Path $_) {
              Copy-Item $_ "$packageName\"
              Write-Host "  📄 Copied $_"
            }
          }
          
          # Create quick start guide
          @"
Voice Command Tool - Quick Start Guide
=====================================

Getting Started:
1. Double-click VoiceCommandTool.exe to launch
2. Click "Start Listening" to begin voice recognition
3. Speak commands clearly into your microphone
4. Recognized commands will be saved to text.txt

System Requirements:
- Windows 10/11 (64-bit)
- Working microphone
- 4 GB RAM recommended
- No additional software needed

Troubleshooting:
- Ensure microphone permissions are enabled
- Check Windows Privacy Settings for microphone access
- Run as administrator if you encounter audio issues
- Close other audio applications if recognition is poor

For full documentation, see README.md
Built on: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')
"@ | Out-File -FilePath "$packageName\QUICK_START.txt" -Encoding UTF8
          
          # Create installation test script
          @"
@echo off
echo Testing Voice Command Tool installation...
echo.
if not exist VoiceCommandTool.exe (
    echo ERROR: VoiceCommandTool.exe not found!
    pause
    exit /b 1
)
echo Found: VoiceCommandTool.exe
echo.
echo Starting application test...
start /wait VoiceCommandTool.exe --help
echo.
echo If the application started successfully, installation is complete.
echo You can now run VoiceCommandTool.exe normally.
echo.
pause
"@ | Out-File -FilePath "$packageName\test_installation.bat" -Encoding ASCII
          
          Write-Host "✅ Distribution package created: $packageName"

      # Step 11: Upload build artifacts
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VoiceControlApp-Windows
          path: VoiceControlApp-Windows-*/
          retention-days: 30

      # Step 12: Create release assets (if tagged)
      - name: Create release archive
        if: startsWith(github.ref, 'refs/tags/')
        shell: powershell
        run: |
          $tag = "${{ github.ref_name }}"
          $platform = if ("${{ github.event.inputs.platform }}") { "${{ github.event.inputs.platform }}" } else { "x64" }
          $timestamp = Get-Date -Format "yyyy-MM-dd"
          $packageName = "VoiceControlApp-Windows-$platform-$timestamp"
          $archiveName = "VoiceControlApp-$tag-Windows-$platform.zip"
          
          if (Test-Path $packageName) {
            Compress-Archive -Path "$packageName\*" -DestinationPath $archiveName
            Write-Host "✅ Created release archive: $archiveName"
            
            # Create checksum
            $hash = Get-FileHash $archiveName -Algorithm SHA256
            "$($hash.Hash) *$archiveName" | Out-File -FilePath "$archiveName.sha256" -Encoding ASCII
            
            Write-Host "✅ Created checksum: $archiveName.sha256"
          } else {
            Write-Error "Package directory not found: $packageName"
            exit 1
          }

      # Step 13: Upload release assets
      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            VoiceControlApp-*.zip
            VoiceControlApp-*.sha256