name: Build Windows Executable

# 允许你从 GitHub Actions 页面手动触发此工作流
on:
  workflow_dispatch:

jobs:
  build-windows:
    # 指定工作流运行在最新的 Windows 环境中
    runs-on: windows-latest

    steps:
      # 步骤1: 检出你的代码
      - name: Check out repository code
        uses: actions/checkout@v4

      # 步骤2: 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # 确保这里的版本和你开发时使用的版本一致

      # 步骤3: 安装项目依赖 (包括 pyinstaller)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      # 步骤4: 运行 PyInstaller 进行打包
      # --onefile: 打包成单个exe文件
      # --windowed: 如果是GUI应用，不显示命令行窗口
      # --name: 指定输出的exe文件名
      - name: Build with PyInstaller
        run: pyinstaller --onefile --name VoiceCommandTool main.py # <-- 把 'your_main_script.py' 换成你的主程序文件名

      # 步骤5: 上传打包好的 .exe 文件作为产物
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-executable # 产物的名称
          path: dist/VoiceCommandTool.exe # PyInstaller 生成的 exe 文件路径