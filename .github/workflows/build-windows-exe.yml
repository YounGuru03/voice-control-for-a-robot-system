# .github/workflows/build-windows-exe.yml

name: Build Windows Executable

on:
  workflow_dispatch:

jobs:
  build-on-windows:
    runs-on: windows-latest

    steps:
      # 步骤 1: 检出代码
      - name: Check out repository code
        uses: actions/checkout@v4

      # 步骤 2: 设置 Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # 确认版本号与你开发时一致

      # 步骤 3: 安装 Python 依赖
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 步骤 4: 下载并准备 FFmpeg
      - name: Download and Extract FFmpeg
        run: |
          Invoke-WebRequest -Uri https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath .
          $ffmpeg_dir = Get-ChildItem -Filter ffmpeg-*-essentials_build
          Move-Item -Path "$($ffmpeg_dir.FullName)\bin\ffmpeg.exe" -Destination .

      # 步骤 5: 使用 PyInstaller 打包
      - name: Build with PyInstaller
        run: >
          pyinstaller
          --onefile
          --windowed
          --name VoiceCommandTool
          --add-binary "ffmpeg.exe;."
          main.py # <--- 项目的主程序文件名

      # 步骤 6: 上传打包好的 .exe
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-executable-with-ffmpeg
          path: dist/VoiceCommandTool.exe # 确认这里的 .exe 文件名与上面 --name 参数一致